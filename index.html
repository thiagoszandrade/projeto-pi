<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="imagens/chart-simple-solid-full.svg" type="image/x-icon" style="color: rgb(132, 0, 255);">
    <title>Controle de Estoque Local</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>📥 Controle de Estoque (Entradas e Saídas)</h2>
        
        <form id="formMovimentacao">
            <select name="" id="nomeResponsavel">
                <option value="">Selecione o professor</option>
                <option value="Ilma">Ilma</option>
                <option value="Karen">Karen</option>
                <option value="Isabela">Isabela</option>
                <option value="Josiane">Josiane</option>
                <option value="Fernando">Fernando</option>
                <option value="Ione">Ione</option>
                <option value="Fernanda">Fernanda</option>
                <option value="Valdirene">Valdirene</option>
                <option value="Simone">Simone</option>
                <option value="Elaine">Elaine</option>
                <option value="Juliano">Juliano</option>
                <option value="Camila">Camila</option>
                <option value="Dilerman">Dilermando</option>
                <option value="Silvia">Silvia</option>
                <option value="Alana">Alana</option>
                <option value="Regina">Regina</option>
            </select>

            <select id="nomeItem">
                <option value="Positivo">Positivo</option>
                <option value="Chrome">Chrome</option>
                <option value="Técnico">Técnico</option>
                <option value="Tablet">Tablet</option>
            </select>
            <input type="number" id="qtdItem" placeholder="Quantidade" min="1" required>
            <select name="" id="selectSala">
                <option value="">Sala</option>
                <option value="6A">6A</option>
                <option value="6B">6B</option>
                <option value="7A">7A</option>
                <option value="7B">7B</option>
                <option value="8A">8A</option>
                <option value="8B">8B</option>
                <option value="9A">9A</option>
                <option value="9B">9B</option>
                <option value="1A">1A</option>
                <option value="1B">1B</option>
                <option value="2A">2A</option>
                <option value="2B">2B</option>
                <option value="3A">3A</option>
                <option value="3B">3B</option>
                <option value="3B">3C</option>
            </select>
            <select id="tipoMovimentacao">
                <option value="Entrada">Entrada (+)</option>
                <option value="Saída">Saída (-)</option>
            </select>
            <button type="submit">Registrar</button>
        </form>

        <div class="dashboard">
            <h3>📊 Dashboard de Movimentações</h3>

            <div class="filtro-periodo">
                <label>De:</label>
                <input type="date" id="dataInicio">
                <label>Até:</label>
                <input type="date" id="dataFim">
                <button onclick="aplicarFiltro()">Filtrar</button>
                <button class="btn-reset" onclick="resetarFiltro()">Limpar Filtro</button>
            </div>

            <div class="cards-resumo">
                <div class="card card-entrada">
                    <span class="card-label">Total Entradas</span>
                    <span class="card-valor" id="totalEntradas">0</span>
                </div>
                <div class="card card-saida">
                    <span class="card-label">Total Saídas</span>
                    <span class="card-valor" id="totalSaidas">0</span>
                </div>
                <div class="card card-estoque">
                    <span class="card-label">Em Estoque</span>
                    <span class="card-valor" id="emEstoque">140</span>
                    <span class="card-sub">de 140 equipamentos</span>
                </div>
            </div>

            <div class="grafico-box">
                <h4>Entradas e Saídas por Dispositivo</h4>
                <canvas id="graficoBarras"></canvas>
            </div>
        </div>

         <div class="historico-header">
            <h3>Histórico de Movimentações</h3>
            <button class="btn-exportar" onclick="exportarExcel()">⬇️ Exportar Excel</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Responsável</th>
                    <th>Item</th>
                    <th>Tipo</th>
                    <th>Quantidade</th>
                    <th>Sala</th>
                    <th>Data/Hora</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>

        <button class="btn-limpar" onclick="limparBanco()">Limpar Todo o Histórico</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
